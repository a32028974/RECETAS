<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Óptica Cristal • Carga de trabajos</title>
  <meta name="theme-color" content="#111827" />
  <link rel="icon" type="image/png" href="logo.png" />
  <!-- Estilos principales -->
  <link rel="stylesheet" href="estilos.css?v=2025-08-25" />
  <!-- SweetAlert para avisos -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <style>
    /* Ajustes mínimos para estructura sin aplastar alturas */
    :root{ --gap:12px; }
    body{ margin:0; font-family: system-ui,-apple-system,Segoe UI,Roboto,Ubuntu,"Helvetica Neue",Arial; background:#f5f7fb; color:#1f2937; }
    .wrap{ max-width:1200px; margin:0 auto; padding:clamp(12px,2vw,24px); display:grid; gap:var(--gap); }
    .card{ background:#fff; border-radius:18px; box-shadow:0 12px 30px rgba(0,0,0,.08); padding:clamp(12px,1.5vw,18px); }
    .grid{ display:grid; gap:var(--gap); }
    .grid.two{ grid-template-columns: 1fr; }
    .grid.three{ grid-template-columns: 1fr; }
    .row{ display:grid; gap:var(--gap); }
    .row.cols-2{ grid-template-columns: 1fr 1fr; }
    .row.cols-3{ grid-template-columns: 1fr 1fr 1fr; }
    .row.cols-4{ grid-template-columns: repeat(4, 1fr); }
    @media (min-width: 860px){
      .grid.two{ grid-template-columns: 1.2fr .8fr; align-items:start; }
      .grid.three{ grid-template-columns: 1fr 1fr 1fr; }
    }
    label{ font-size:13px; color:#374151; }
    input, select, textarea{ width:100%; padding:10px 12px; border:1px solid #e5e7eb; border-radius:12px; font-size:14px; background:#fff; }
    input:focus, select:focus, textarea:focus{ outline:2px solid #1b64f233; border-color:#1b64f2; }
    h1{ font-size: clamp(18px, 2.2vw, 22px); margin:0; }
    .title-row{ display:grid; grid-template-columns: 1fr auto; align-items:center; gap:var(--gap); }
    .brand{ display:flex; align-items:center; gap:10px; }
    .brand img{ width:36px; height:36px; border-radius:8px; object-fit:contain; }
    .muted{ color:#6b7280; font-size: 12px; }
    .actions{ display:flex; gap:10px; flex-wrap:wrap; }
    button{ border:0; border-radius:12px; padding:10px 14px; background:#1b64f2; color:#fff; cursor:pointer; font-weight:600; }
    button.secondary{ background:#111827; }
    button.ghost{ background:#eef2ff; color:#1b64f2; }
    .seg{ display:flex; gap:8px; }
    .seg label{ display:flex; align-items:center; gap:6px; background:#f3f4f6; padding:8px 10px; border-radius:10px; cursor:pointer; }
    .seg input{ width:auto; }
    .small{ font-size:12px; }
    .table{ width:100%; border-collapse:collapse; }
    .table th,.table td{ text-align:left; padding:8px 10px; border-bottom:1px solid #e5e7eb; font-size:14px; }
    .pill{ display:inline-block; padding:2px 8px; border-radius:999px; background:#eef2ff; color:#1b64f2; font-weight:600; }
    .inline-loader{ display:inline-flex; align-items:center; gap:8px; }
    .inline-loader[hidden]{ display:none; }
    .spinner-screen{ position:fixed; inset:0; background:rgba(17,24,39,.6); display:none; align-items:center; justify-content:center; z-index:1000; }
    .spinner{ width:64px; height:64px; border-radius:50%; border:6px solid #fff; border-top-color:#1b64f2; animation:spin 1s linear infinite; }
    @keyframes spin{ to{ transform:rotate(360deg); } }
    /* Área de impresión (se genera dinámicamente con __buildPrintArea) */
    @media print{ .no-print{ display:none !important; } }
  </style>
</head>
<body>
  <div id="spinner" class="spinner-screen no-print"><div class="spinner"></div></div>
  <div class="wrap">
    <!-- ENCABEZADO -->
    <div class="card">
      <div class="title-row">
        <div class="brand">
          <img src="logo.png" alt="Óptica Cristal" />
          <div>
            <h1>Óptica Cristal v3 <span class="muted">• Carga de trabajos</span></h1>
            <div class="small muted">San Miguel • Argentina</div>
          </div>
        </div>
        <div class="row" style="grid-template-columns:minmax(180px, 260px);">
          <div>
            <label for="numero_trabajo">Número de trabajo</label>
            <input id="numero_trabajo" name="numero_trabajo" inputmode="numeric" autocomplete="off" placeholder="Se genera desde el teléfono" />
          </div>
        </div>
      </div>
    </div>

    <form id="formulario" class="grid two" autocomplete="off">
      <!-- Columna izquierda: datos del trabajo -->
      <section class="card grid" aria-label="Datos del trabajo">
        <div class="row cols-3">
          <div>
            <label for="fecha">Fecha que encarga</label>
            <input id="fecha" name="fecha" placeholder="dd/mm/aa" />
          </div>
          <div>
            <label class="small">Modalidad de entrega</label>
            <div class="seg" role="radiogroup" aria-label="Entrega">
              <label><input type="radio" name="entrega" value="7" checked /> Stock (7 días aprox)</label>
              <label><input type="radio" name="entrega" value="3" /> Urgente (3 días)</label>
              <label><input type="radio" name="entrega" value="15" /> Laboratorio (15 días)</label>
            </div>
          </div>
          <div>
            <label for="fecha_retira">Fecha que retira (estimada)</label>
            <input id="fecha_retira" name="fecha_retira" type="date" />
          </div>
        </div>

        <div class="row cols-3">
          <div>
            <label for="telefono">Teléfono (genera N°)</label>
            <input id="telefono" name="telefono" placeholder="11 2345 6789" autocomplete="tel" />
          </div>
          <div>
            <label for="dni">DNI</label>
            <input id="dni" name="dni" inputmode="numeric" placeholder="Sólo números" />
            <div id="dni-loading" class="inline-loader" hidden>
              <span class="pill">Buscando…</span>
            </div>
          </div>
          <div>
            <label for="nombre">Apellido y nombre</label>
            <input id="nombre" name="nombre" placeholder="Apellido y nombre" />
          </div>
        </div>

        <div class="row cols-3">
          <div>
            <label for="dr">Dr. (oculista)</label>
            <input id="dr" name="dr" placeholder="Opcional" />
          </div>
          <div>
            <label for="dnp">DNP (OD/OI)</label>
            <input id="dnp" name="dnp" placeholder="12/34" />
          </div>
          <div>
            <label for="add">ADD</label>
            <input id="add" name="add" placeholder="" />
          </div>
        </div>

        <div class="row cols-4">
          <div>
            <label for="od_esf">OD ESF</label>
            <select id="od_esf" name="od_esf"></select>
          </div>
          <div>
            <label for="od_cil">OD CIL</label>
            <select id="od_cil" name="od_cil"></select>
          </div>
          <div>
            <label for="od_eje">OD EJE (0–180)</label>
            <input id="od_eje" name="od_eje" inputmode="numeric" />
          </div>
          <div>
            <label for="cristal">Tipo de cristal</label>
            <input id="cristal" name="cristal" placeholder="Monofocal / Bifocal / Progresivo" />
          </div>
        </div>

        <div class="row cols-3">
          <div>
            <label for="oi_esf">OI ESF</label>
            <select id="oi_esf" name="oi_esf"></select>
          </div>
          <div>
            <label for="oi_cil">OI CIL</label>
            <select id="oi_cil" name="oi_cil"></select>
          </div>
          <div>
            <label for="oi_eje">OI EJE (0–180)</label>
            <input id="oi_eje" name="oi_eje" inputmode="numeric" />
          </div>
        </div>

        <div class="row cols-3">
          <div>
            <label for="precio_cristal">Precio cristal</label>
            <input id="precio_cristal" name="precio_cristal" inputmode="decimal" placeholder="$" />
          </div>
          <div>
            <label for="otro_concepto">Otro concepto</label>
            <input id="otro_concepto" name="otro_concepto" placeholder="Ej: tratamiento" />
          </div>
          <div>
            <label for="precio_otro">Precio otro</label>
            <input id="precio_otro" name="precio_otro" inputmode="decimal" placeholder="$" />
          </div>
        </div>

        <div class="row cols-3">
          <div>
            <label for="vendedor">Vendedor</label>
            <input id="vendedor" name="vendedor" placeholder="" />
          </div>
          <div>
            <label for="forma_pago">Forma de pago</label>
            <input id="forma_pago" name="forma_pago" placeholder="Efectivo / Tarjeta / Transferencia" />
          </div>
          <div>
            <label for="descripcion">Tipo / Entrega</label>
            <input id="descripcion" name="descripcion" placeholder="NORMAL / URGENTE / LABORATORIO" />
          </div>
        </div>
      </section>

      <!-- Columna derecha: armazón + totales + fotos -->
      <aside class="grid" aria-label="Armazón y totales">
        <div class="card grid">
          <div class="row cols-3">
            <div>
              <label for="numero_armazon">Nº armazón</label>
              <input id="numero_armazon" name="numero_armazon" inputmode="numeric" placeholder="Sólo números" />
              <div id="armazon-loading" class="inline-loader" hidden>
                <span class="pill">Buscando…</span>
              </div>
            </div>
            <div>
              <label for="armazon_detalle">Detalle armazón</label>
              <input id="armazon_detalle" name="armazon_detalle" placeholder="Marca / Modelo / Color" />
            </div>
            <div>
              <label for="precio_armazon">Precio armazón</label>
              <input id="precio_armazon" name="precio_armazon" inputmode="decimal" placeholder="$" />
            </div>
          </div>
          <div class="row cols-3">
            <div>
              <label for="total">Total</label>
              <input id="total" name="total" inputmode="decimal" placeholder="$" />
            </div>
            <div>
              <label for="sena">Seña</label>
              <input id="sena" name="sena" inputmode="decimal" placeholder="$" />
            </div>
            <div>
              <label for="saldo">Saldo</label>
              <input id="saldo" name="saldo" inputmode="decimal" placeholder="$" />
            </div>
          </div>
        </div>

        <div class="card grid no-print">
          <div class="actions">
            <button id="btn-imprimir" type="button" class="ghost">Imprimir</button>
            <button id="btn-limpiar" type="button" class="secondary">Limpiar</button>
            <button type="submit">Guardar</button>
          </div>
          <!-- Galería de fotos (se completa desde fotoPack.js) -->
          <div id="galeria-fotos" class="small muted"></div>
        </div>

        <!-- Historial (resultados de búsqueda) -->
        <div class="card">
          <h3 style="margin:0 0 8px 0; font-size:16px;">Historial</h3>
          <div class="row cols-3">
            <input id="hist-q" placeholder="Buscar: nombre, DNI, tel o @123 (exacto)" />
            <input id="hist-limit" type="number" min="1" max="500" value="100" />
            <button id="hist-buscar" type="button">Buscar</button>
          </div>
          <div id="historial" class="small muted" style="margin-top:8px;">
            <!-- historial.js inyecta la tabla acá -->
          </div>
        </div>
      </aside>
    </form>
  </div>

  <!-- Módulos JS (mantengo tu estructura actual) -->
  <script type="module" src="api.js"></script>
  <script type="module" src="fechaHoy.js"></script>
  <script type="module" src="buscarNombre.js"></script>
  <script type="module" src="buscarArmazon.js"></script>
  <script type="module" src="guardar.js"></script>
  <script type="module" src="historial.js"></script>
  <script type="module" src="numeroTrabajo.js"></script>
  <script type="module" src="main.js"></script>
</body>
</html>
