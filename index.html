<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Carga de receta</title>

  <!-- CSS principal -->
  <link rel="stylesheet" href="estilos.css?v=7" />

  <!-- PWA -->
  <link rel="manifest" href="manifest.webmanifest" />
  <meta name="theme-color" content="#111827" />

  <!-- SweetAlert -->
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
</head>
<body>
  <!-- Overlay spinner (lo controla JS con lockForm/unlockForm) -->
  <div class="spinner" id="spinner">
    <div class="loader"></div>
    <div class="spinner-text">Cargando...</div>
  </div>

  <form id="formulario" class="card">
    <!-- ===== Header de la tarjeta (mockup) ===== -->
    <div class="card-head">
      <h2 class="card-title">Optica Cristal</h2>
      <div class="pill">
        <span>Número de trabajo</span>
        <input type="text" name="numero_trabajo" id="numero_trabajo" placeholder="Auto por teléfono" required />
      </div>
      <div class="pill">
        <span>Fecha que retira (estimada)</span>
        <input type="text" name="fecha_retira" id="fecha_retira" readonly />
      </div>
    </div>

    <!-- ===== Fechas ===== -->
    <div class="grid-2">
      <label class="field">
        <span>Fecha que encarga</span>
        <input type="text" name="fecha" id="fecha" readonly />
      </label>
      <div class="field">
        <span>&nbsp;</span>
      </div>
    </div>

    <!-- ===== Entrega ===== -->
    <div class="row">
      <span class="muted">Días estimados de entrega:</span>
      <label><input type="radio" name="entrega" value="7" checked /> Stock <span class="sub">(7 días aprox)</span></label>
      <label><input type="radio" name="entrega" value="3" /> Urgente <span class="sub">(3 días aprox)</span></label>
      <label><input type="radio" name="entrega" value="15" /> Laboratorio <span class="sub">(15 días aprox)</span></label>
    </div>

    <!-- ===== Identificación ===== -->
    <div class="grid-4">
      <label class="field">
        <span>Nombre del vendedor</span>
        <input type="text" name="vendedor" id="vendedor" placeholder="" />
      </label>
      <label class="field">
        <span>DNI</span>
        <div class="dni-wrapper">
          <input type="text" name="dni" id="dni" required />
          <span id="dni-loading" class="inline-spinner" hidden></span>
        </div>
      </label>
      <label class="field">
        <span>Apellido y nombre</span>
        <input type="text" name="nombre" id="nombre" required />
      </label>
      <label class="field">
        <span>Número de teléfono</span>
        <input type="text" name="telefono" id="telefono" required />
      </label>
    </div>

    <!-- ===== Producto ===== -->
    <div class="grid-2 block-cristal">
      <label class="field">
        <span>Tipo de cristal</span>
        <input type="text" name="cristal" id="cristal" list="lista-cristales" required />
        <datalist id="lista-cristales"></datalist>
      </label>
      <label class="field">
        <span>Precio</span>
        <input type="text" id="precio_cristal" name="precio_cristal" />
      </label>
    </div>

    <!-- ===== Armazón ===== -->
    <div class="grid-armazon">
      <label class="field">
        <span>Número de armazón (si tiene)</span>
        <div class="dni-wrapper">
          <input
            type="text"
            name="numero_armazon"
            id="numero_armazon"
            inputmode="numeric"
            pattern="\d{5,7}"
            maxlength="7"
            class="w-7ch"
            placeholder="N° Anteojo"
          />
          <span id="armazon-loading" class="inline-spinner" hidden></span>
        </div>
      </label>
      <label class="field">
        <span>Precio</span>
        <input type="text" id="precio_armazon" name="precio_armazon" class="w-10ch" />
      </label>
    </div>

    <!-- Modelo de armazón (full ancho) -->
    <label class="field">
      <span>Modelo de armazón</span>
      <input type="text" name="armazon_detalle" id="armazon_detalle" />
    </label>

    <!-- ===== Otro concepto ===== -->
    <div class="grid-2">
      <label class="field">
        <span>Otro concepto</span>
        <input type="text" name="otro_concepto" id="otro_concepto" placeholder="Obra social/descuento/recargo" />
      </label>
      <label class="field">
        <span>Precio</span>
        <input type="text" id="precio_otro" name="precio_otro" />
      </label>
    </div>

    <!-- ===== Descripción / Tipo / DR ===== -->
    <div class="grid-3">
      <label class="field">
        <span>Tipo de visión</span>
        <div class="seg" role="group" aria-label="Tipo de visión">
          <button type="button" class="seg-btn" data-value="PROGRESIVO">Progresivo</button>
          <button type="button" class="seg-btn" data-value="BIFOCAL">Bifocal</button>
          <button type="button" class="seg-btn" data-value="MONOFOCAL">Monofocal</button>
        </div>
        <input type="hidden" name="descripcion" id="descripcion" />
      </label>
      <label class="field">
        <span>Otra aclaración</span>
        <input type="text" name="tipo" placeholder="Otros" />
      </label>
      <label class="field">
        <span>DR (oculista)</span>
        <input type="text" name="dr" id="dr" placeholder="Ej: Dr. Oculista" />
      </label>
    </div>

    <!-- ===== Receta ===== -->
    <div class="receta">
      <h3>OD</h3>
      <div class="fila">
        <select name="od_esf" id="od_esf"></select>
        <select name="od_cil" id="od_cil"></select>
        <div class="eje-wrap">
          <span class="badge-eje">EJE</span>
          <input type="text" name="od_eje" id="od_eje" inputmode="numeric" placeholder="0–180" />
        </div>
      </div>

      <h3>OI</h3>
      <div class="fila">
        <select name="oi_esf" id="oi_esf"></select>
        <select name="oi_cil" id="oi_cil"></select>
        <div class="eje-wrap">
          <span class="badge-eje">EJE</span>
          <input type="text" name="oi_eje" id="oi_eje" inputmode="numeric" placeholder="0–180" />
        </div>
      </div>

      <div class="fila">
        <input type="text" name="dnp" id="dnp" placeholder="DNP OD/OI" />
        <input type="text" name="add" id="add" placeholder="ADD" />
      </div>
    </div>

    <!-- ===== Fotos + Pack PDF ===== -->
    <div class="field">
      <span>Fotos del anteojo</span>
      <div class="row" style="gap:10px; align-items:center;">
        <button type="button" id="btn-foto">📷 Tomar foto</button>
        <button type="button" id="btn-galeria">📁 Galería</button>
        <button type="button" id="btn-generar-pack">📄 Generar PDF (resumen + fotos)</button>
        <input type="hidden" id="pack_url" name="pack_url" />
        <input type="file" id="galeria-input" accept="image/*" multiple hidden />
      </div>
      <div id="galeria-fotos" class="galeria"></div>
    </div>

    <!-- ===== Totales ===== -->
    <div class="totales">
      <label class="field">
        <span>FORMA DE PAGO</span>
        <input type="text" id="forma_pago" name="forma_pago" />
      </label>
      <label class="field">
        <span>TOTAL</span>
        <input type="text" id="total" name="total" readonly />
      </label>
      <label class="field">
        <span>SEÑA</span>
        <input type="text" id="sena" name="sena" />
      </label>
      <label class="field">
        <span>SALDO</span>
        <input type="text" id="saldo" name="saldo" readonly />
      </label>
    </div>

    <!-- Acciones dentro de la tarjeta (solo el botón Guardar) -->
    <div class="row end" style="margin-top:6px;">
      <input type="submit" value="Guardar" />
    </div>
  </form>

  <!-- Área para IMPRESIÓN -->
  <div id="print-area" class="print-area" aria-hidden="true"></div>

  <!-- Acciones inferiores -->
  <div class="acciones">
    <div class="btns-left">
      <button type="button" id="btn-imprimir">🖨️ Imprimir</button>
      <button type="button" id="btn-limpiar">🧹 Limpiar</button>
      <a href="historial/index.html" class="btn-secondary">Historial</a>
    </div>
  </div>

  <!-- ===== Modal de cámara ===== -->
  <div id="cam-modal" class="cam-modal" hidden>
    <div class="cam-dialog">
      <div class="cam-head">
        <span>Cámara</span>
        <button type="button" id="cam-close-x" class="cam-close" aria-label="Cerrar">✕</button>
      </div>
      <video id="cam-video" playsinline autoplay muted></video>
      <div id="cam-preview" style="display:none; margin-top:6px;">
        <canvas id="cam-shot"></canvas>
      </div>
      <div class="cam-actions">
        <button type="button" id="cam-tomar">Tomar foto</button>
        <button type="button" id="cam-usar" disabled>Usar esta</button>
        <button type="button" id="cam-cancelar">Cancelar</button>
      </div>
    </div>
  </div>

  <!-- JS principal -->
  <script type="module" src="js/main.js"></script>
  <script type="module" src="js/generarPack.js"></script>

  <script>
    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("./service-worker.js").catch(console.error);
      });
    }
  </script>
</body>
</html>
